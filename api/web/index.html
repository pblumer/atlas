<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2314161a'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='700' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
  <!-- App-switcher drawer (hidden until the grid button is pressed) -->
  <div id="scrim" hidden></div>
  <aside id="drawer" hidden aria-label="Applications">
    <div class="drawer-head">
      <button id="drawer-close" class="icon-btn" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <span class="brand"><span class="mark" aria-hidden="true">A</span> <b>Atlas</b></span>
    </div>
    <nav id="drawer-apps"></nav>
  </aside>

  <!-- Top bar -->
  <header class="topbar">
    <button id="app-switcher" class="icon-btn grid" title="Switch app" aria-label="Switch app">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <circle cx="5" cy="5" r="1.6"/><circle cx="12" cy="5" r="1.6"/><circle cx="19" cy="5" r="1.6"/>
        <circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>
        <circle cx="5" cy="19" r="1.6"/><circle cx="12" cy="19" r="1.6"/><circle cx="19" cy="19" r="1.6"/>
      </svg>
    </button>
    <a class="brand topbrand" href="#/console">
      <span class="mark" aria-hidden="true">A</span>
      <b id="app-name">Console</b>
    </a>
    <span class="divider"></span>
    <nav id="topnav" class="topnav"></nav>

    <div class="spacer"></div>

    <span id="org" class="org">Atlas Org</span>
    <button class="icon-btn" title="Search" aria-label="Search"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
    <button class="icon-btn" title="Notifications" aria-label="Notifications"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg></button>
    <button class="icon-btn" title="Help" aria-label="Help"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 013.9-2c1.3.9 1.1 2.3 0 3.2-.7.6-1.4 1-1.4 2M12 17h.01"/></svg></button>
    <button class="icon-btn avatar" title="Account" aria-label="Account">PB</button>
  </header>

  <main id="view"></main>

  <div id="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
