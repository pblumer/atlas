name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: build · vet · fmt · race · cover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$out"
            exit 1
          fi

      - name: Test (race detector)
        run: go test -race ./...

      - name: Coverage floor (>= 95%, ADR-0018)
        run: ./scripts/check-coverage.sh 95
